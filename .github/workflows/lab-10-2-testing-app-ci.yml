name: lab-10.2/testing-app CI

on:
  push:
    branches: [main]
    paths:
      - "lab-10.2/testing-app/**"
      - ".github/workflows/lab-10-2-testing-app-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "lab-10.2/testing-app/**"
      - ".github/workflows/lab-10-2-testing-app-ci.yml"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab-10.2/testing-app
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lab-10.2/testing-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test -- --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: lab-10.2/testing-app/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: lab-10.2/testing-app
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lab-10.2/testing-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
